<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اوج | در حال بروزرسانی</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#0a1625,#1e3a5f);
        color:white;
        font-family:Tahoma,sans-serif;
        text-align:center;
        overflow:hidden;
    }

    .card{
        background: rgba(255,255,255,0.08);
        padding:40px;
        border-radius:25px;
        backdrop-filter: blur(10px);
        box-shadow:0 0 30px rgba(245,197,24,.3);
        max-width:600px;
        width:90%;
    }

    h1{
        color:#f5c518;
        margin-bottom:10px;
    }

    .loader{
        width:70px;
        height:70px;
        border:6px solid rgba(255,255,255,.2);
        border-top:6px solid #f5c518;
        border-radius:50%;
        animation: spin 1s linear infinite;
        margin:25px auto;
    }

    @keyframes spin{
        to{
            transform: rotate(360deg);
        }
    }

    .version{
        opacity:.8;
        margin-top:20px;
        font-size:14px;
    }
</style>
</head>
<body>

<div class="card">
    <h1>🌦️ اوج</h1>

    <div class="loader"></div>

    <h2>سایت در حال بروزرسانی است</h2>

    <p>
        نسخه جدید با امکانات بیشتر و بهبودهای تازه در حال آماده‌سازی است.
        لطفاً کمی بعد دوباره مراجعه کنید.
    </p>

    <div class="version">
        نسخه فعلی: 1.0 <br>
        نسخه بعدی: 2.0 🚀
    </div>
</div>

</body>
</html>
